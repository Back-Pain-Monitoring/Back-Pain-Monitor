export default "<ion-header>\r\n  <ion-toolbar>\r\n    <ion-title text-wrap>Do you have any of these?</ion-title>\r\n  </ion-toolbar>\r\n</ion-header>\r\n\r\n<ion-content>\r\n  <ion-list>\r\n    <ion-item *ngFor=\"let entry of form\">\r\n      <ion-label text-wrap>{{entry.val}}</ion-label>\r\n      <ion-checkbox slot=\"end\" [(ngModel)]=\"entry.isChecked\"></ion-checkbox>\r\n    </ion-item>\r\n  </ion-list>\r\n\r\n  <!--Back button to symptoms page-->\r\n  <ion-fab vertical=\"bottom\" horizontal=\"start\" slot=\"fixed\">\r\n    <ion-fab-button color=\"success\" routerDirection=\"back\" routerLink=\"/symptoms\" (click)=\"updateLog()\">\r\n      <ion-icon name=\"arrow-back-circle-outline\" color=\"dark\"></ion-icon>\r\n    </ion-fab-button>\r\n  </ion-fab>\r\n\r\n  <!--Forward Button to comments page-->\r\n  <ion-fab vertical=\"bottom\" horizontal=\"end\" slot=\"fixed\">\r\n    <ion-fab-button color=\"success\" routerDirection=\"forward\" routerLink=\"/comments\" (click)=\"updateLog()\">\r\n      <ion-icon name=\"arrow-forward-circle-outline\" color=\"dark\"></ion-icon>\r\n    </ion-fab-button>\r\n  </ion-fab>\r\n\r\n</ion-content>";
