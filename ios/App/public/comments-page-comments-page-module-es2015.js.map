export default "<ion-header>\r\n  <ion-toolbar>\r\n    <ion-title>Comments</ion-title>\r\n  </ion-toolbar>\r\n</ion-header>\r\n\r\n<ion-content>\r\n  <ion-text>\r\n    <h1>Notes</h1>\r\n  </ion-text>\r\n\r\n  <ion-item>\r\n    <ion-textarea rows=\"6\" cols=\"20\" [(ngModel)]=\"comment\"\r\n      placeholder=\"e.g. Lifting right arm caused pain on my lower back...\"></ion-textarea>\r\n  </ion-item>\r\n\r\n  <!--Back button to redflags page-->\r\n  <ion-fab vertical=\"bottom\" horizontal=\"start\" slot=\"fixed\">\r\n    <ion-fab-button color=\"success\" routerDirection=\"back\" routerLink=\"/redflags\" (click)=\"updateLog()\">\r\n      <ion-icon name=\"arrow-back-circle-outline\" color=\"dark\"></ion-icon>\r\n    </ion-fab-button>\r\n  </ion-fab>\r\n\r\n  <!--Submit button that takes you back to home page-->\r\n  <ion-fab vertical=\"bottom\" horizontal=\"center\" slot=\"fixed\">\r\n    <ion-button expand=\"block\" (click)=\"makeAlert()\">Submit</ion-button>\r\n  </ion-fab>\r\n</ion-content>";
